# Documentation build workflow — Delone.jl
#
# CAVEAT: not validated end-to-end on a real GitHub Actions runner (authored
# locally by an AI agent with no access to Actions). Best-effort first pass,
# modeled on README.md's Documentation section:
#   julia --project=docs -e 'using Pkg; Pkg.develop(path="."); Pkg.instantiate()'
#   julia --project=docs docs/make.jl
#
# Deploy status: docs/make.jl now calls deploydocs(repo="github.com/ahojukka5/
# Delone.jl.git", ...), so this workflow passes DOCUMENTER_KEY/GITHUB_TOKEN
# through to the build step. deploydocs() only actually publishes when it
# detects a real CI deploy context (correct branch + a present key/token) —
# it no-ops on PR builds and on local runs without those env vars, so this is
# safe to leave active for every trigger below.
#
# REQUIRED HUMAN STEP: a repo secret named DOCUMENTER_KEY (an SSH deploy key
# with push access, generated via `DocumenterTools.genkeys(user="ahojukka5",
# repo="Delone.jl")` or the GitHub App) must be added in repo settings before
# this actually deploys anything — this workflow does not fabricate or assume
# that secret's value. Until it's added, the deploy step will simply skip
# publishing (Documenter logs a warning) and the build-check still runs.
name: Documentation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
          arch: x64

      - name: Cache Julia artifacts/packages
        uses: julia-actions/cache@v2

      - name: Develop Delone into the docs environment
        run: julia --project=docs -e 'using Pkg; Pkg.develop(path="."); Pkg.instantiate()'

      - name: Build and deploy docs
        # Runs doctests (docs/make.jl: doctest=true) and, on a push to master
        # with DOCUMENTER_KEY configured, publishes via deploydocs(). See the
        # caveats at the top of this file — deploy is a no-op until that
        # secret is added.
        run: julia --project=docs docs/make.jl
        env:
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
